workflows:
  ios-workflow:
    name: PathLog iOS
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: PATHLOG API KEY ASC
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.trailNotes
      vars:
        XCODE_PROJECT: "TrailNotes.xcodeproj"
        XCODE_SCHEME: "TrailNotes"
        APP_STORE_APP_ID: "6760856369"
      xcode: 26.0
    scripts:
      - name: Set build number
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo "0")
          BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
          cd $CM_BUILD_DIR
          agvtool new-version -all $BUILD_NUMBER
          echo "Build number set to: $BUILD_NUMBER"
      - name: Fetch signing certificates and profiles
        script: |
          app-store-connect fetch-signing-files com.trailNotes \
            --type IOS_APP_STORE \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
        working_directory: $CM_BUILD_DIR
      - name: Set up code signing
        script: |
          xcode-project use-profiles
        working_directory: $CM_BUILD_DIR
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
        working_directory: $CM_BUILD_DIR
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - build/*.xcarchive
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
      email:
        recipients:
          - lyashko.denis@gmail.com
        notify:
          success: true
          failure: true
